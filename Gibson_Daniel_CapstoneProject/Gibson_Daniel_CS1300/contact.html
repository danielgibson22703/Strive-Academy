<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Strive Academy</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Contact Strive Academy for Guilty Gear Strive coaching, questions, and booking details.">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>

<body>
    <header>
        <nav>
            <h1 class="logo">Strive Academy</h1>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="coaching.html">Coaching</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <section class="contact">
                <h2>Contact Me</h2>
                <p>Have questions or want to know more about coaching? Send a message below.</p>

                <form id="contactForm">
                    <!-- Name -->
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <!-- Email -->
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <!-- Reason -->
                    <label for="message">Reason for Contact:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <button type="submit">Send Message</button>
                </form>
            </section>
        </section>
    </main>
    <footer>
        <p>Contact: dgibson9@my.westga.edu</p>
        <div id="lastModified"></div>
        <script>
        $(document).ready(function () {
            $("#lastModified").html("<h6>This page was last modified: " + document.lastModified + "</h6>");
        });
    </script>
    </footer>
</body>

</html>
